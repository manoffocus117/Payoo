<!doctype html>
<html lang="en">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0"
            />
            <link
                  rel="shortcut icon"
                  href="assets/main-icon.svg"
                  type="image/x-icon"
            />
            <link rel="stylesheet" href="styles/styles.css" />
            <title>Payoo</title>
      </head>
      <body>
            <main class="container">
                  <section class="login" id="login">
                        <figure class="login-image">
                              <img src="assets/main-icon.svg" alt="main icon" />
                        </figure>
                        <div class="login-form">
                              <div class="form-input">
                                    <label for="mobile-number"
                                          >Mobile Number</label
                                    >
                                    <input
                                          type="text"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          id="mobile-number"
                                          placeholder="Enter Mobile Number"
                                          required
                                    />
                              </div>
                              <div class="form-input">
                                    <label for="pin-number">4 Digit Pin</label>
                                    <input
                                          type="text"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          id="pin-number"
                                          placeholder="Enter 4 Digit Pin"
                                          required
                                    />
                              </div>
                              <button id="login-button">Login</button>
                        </div>
                  </section>
                  <section class="home" id="home">
                        <div class="header">
                              <div class="header-brand">
                                    <figure>
                                          <img
                                                src="assets/main-icon.svg"
                                                alt=""
                                          />
                                    </figure>
                                    <div class="balance">
                                          <span>$2222</span>
                                          <span>Available Balance</span>
                                    </div>
                              </div>
                              <button>Log Out</button>
                        </div>
                        <div class="home-text">
                              <h1>Welcome to Payoo!</h1>
                              <p>
                                    Enjoy easy and convenient financial services
                                    with us. Cashout charge is low and
                              </p>
                        </div>
                        <div class="finance-options">
                              <div class="option">
                                    <img
                                          src="assets/icons/add-money.png"
                                          alt="add money"
                                    />
                                    <span>Add money</span>
                              </div>
                              <div class="option">
                                    <img
                                          src="assets/icons/cash-out.png"
                                          alt="cash out"
                                    />
                                    <span>Cash Out</span>
                              </div>
                              <div class="option">
                                    <img
                                          src="assets/icons/money-transfer.png"
                                          alt="money transfer"
                                    />
                                    <span>Transfer Money</span>
                              </div>
                              <div class="option">
                                    <img
                                          src="assets/icons/bonus.png"
                                          alt="get bonus"
                                    />
                                    <span>Get Bonus</span>
                              </div>
                              <div class="option">
                                    <img
                                          src="assets/icons/pay-bill.png"
                                          alt="pay bill"
                                    />
                                    <span>Pay Bill</span>
                              </div>
                              <div class="option">
                                    <img
                                          src="assets/icons/transaction.png"
                                          alt="transactions"
                                    />
                                    <span>Transactions</span>
                              </div>
                        </div>
                  </section>
            </main>
            <script src="scripts/script.js"></script>
      </body>
</html>
