<!doctype html>
<html lang="en">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0"
            />
            <link
                  rel="shortcut icon"
                  href="assets/main-icon.svg"
                  type="image/x-icon"
            />
            <link rel="stylesheet" href="styles/styles.css" />
            <title>Payoo</title>
      </head>
      <body>
            <main class="container">
                  <section class="login" id="login">
                        <figure class="login-image">
                              <img src="assets/main-icon.svg" alt="main icon" />
                        </figure>
                        <div class="login-form">
                              <div class="form-input">
                                    <label for="mobile-number"
                                          >Mobile Number</label
                                    >
                                    <input
                                          type="text"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          id="mobile-number"
                                          placeholder="Enter Mobile Number"
                                          required
                                    />
                              </div>
                              <div class="form-input">
                                    <label for="pin-number">4 Digit Pin</label>
                                    <input
                                          type="text"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          id="pin-number"
                                          placeholder="Enter 4 Digit Pin"
                                          required
                                    />
                              </div>
                              <button id="login-button">Login</button>
                        </div>
                  </section>
                  <section class="home" id="home">
                        <div class="header">
                              <div class="header-brand">
                                    <figure>
                                          <img
                                                src="assets/main-icon.svg"
                                                alt=""
                                          />
                                    </figure>
                                    <div class="balance">
                                          <span>$2222</span>
                                          <span>Available Balance</span>
                                    </div>
                              </div>
                              <button>Log Out</button>
                        </div>
                        <div class="home-text">
                              <h1>Welcome to Payoo!</h1>
                              <p>
                                    Enjoy easy and convenient financial services
                                    with us. Cashout charge is low and
                              </p>
                        </div>
                        <div class="finance-options">
                              <div class="option" id="add-money-option">
                                    <img
                                          src="assets/icons/add-money.png"
                                          alt="add money"
                                    />
                                    <span>Add money</span>
                              </div>
                              <div class="option" id="cash-out-option">
                                    <img
                                          src="assets/icons/cash-out.png"
                                          alt="cash out"
                                    />
                                    <span>Cash Out</span>
                              </div>
                              <div class="option" id="transfer-money-option">
                                    <img
                                          src="assets/icons/money-transfer.png"
                                          alt="money transfer"
                                    />
                                    <span>Transfer Money</span>
                              </div>
                              <div class="option" id="get-bonus-option">
                                    <img
                                          src="assets/icons/bonus.png"
                                          alt="get bonus"
                                    />
                                    <span>Get Bonus</span>
                              </div>
                              <div class="option" id="pay-bill-option">
                                    <img
                                          src="assets/icons/pay-bill.png"
                                          alt="pay bill"
                                    />
                                    <span>Pay Bill</span>
                              </div>
                              <div class="option" id="transactions-option">
                                    <img
                                          src="assets/icons/transaction.png"
                                          alt="transactions"
                                    />
                                    <span>Transactions</span>
                              </div>
                        </div>
                  </section>
                  <section class="add-money" id="add-money-section">
                        <h1>Add Money</h1>
                        <div class="add-money-form">
                              <div class="select-bank">
                                    <label for="select-bank"
                                          >Select A Bank</label
                                    >
                                    <select name="select-bank" id="select-bank">
                                          <option value="select a bank">
                                                Select A Bank
                                          </option>
                                          <option value="Islami Bank">
                                                Islami Bank
                                          </option>
                                          <option value="Sonali Bank">
                                                Sonali Bank
                                          </option>
                                          <option value="Ogroni Bank">
                                                Ogroni Bank
                                          </option>
                                          <option value="Jamuna Bank">
                                                Jamuna Bank
                                          </option>
                                    </select>
                              </div>
                              <div class="account-number">
                                    <label for="bank-account-number"
                                          >Bank Account Number</label
                                    >
                                    <input
                                          type="text"
                                          id="bank-account-number"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 11 Digit Account Number"
                                          required
                                    />
                              </div>
                              <div class="amount">
                                    <label for="add-amount"
                                          >Amount to Add</label
                                    >
                                    <input
                                          type="text"
                                          id="add-amount"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter Amount to Add"
                                    />
                              </div>
                              <div class="add-money-pin">
                                    <label for="add-money-pin"
                                          >4 DIgit Pin</label
                                    >
                                    <input
                                          type="text"
                                          id="add-money-pin"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 4 Digit Pin"
                                    />
                              </div>
                              <button id="add-money">Add Money</button>
                        </div>
                  </section>
                  <section class="cash-out" id="cash-out-section">
                        <h1>Cash Out</h1>
                        <div class="cash-out-form">
                              <div class="agent-number">
                                    <label for="agent-number"
                                          >Bank Account Number</label
                                    >
                                    <input
                                          type="text"
                                          id="agent-number"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 11 Digit Account Number"
                                          required
                                    />
                              </div>
                              <div class="cash-out-amount">
                                    <label for="out-amount"
                                          >Amount to Out</label
                                    >
                                    <input
                                          type="text"
                                          id="out-amount"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter Amount to Add"
                                    />
                              </div>
                              <div class="cash-out-pin">
                                    <label for="cash-out-pin"
                                          >4 DIgit Pin</label
                                    >
                                    <input
                                          type="text"
                                          id="cash-out-pin"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 4 Digit Pin"
                                    />
                              </div>
                              <button id="add-money">Cash Out</button>
                        </div>
                  </section>
                  <section class="transfer-money" id="transfer-money-section">
                        <h1>Transfer Money</h1>
                        <div class="transfer-money-form">
                              <div class="user-number">
                                    <label for="user-number"
                                          >User Account Number</label
                                    >
                                    <input
                                          type="text"
                                          id="user-number"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 11 Digit Number"
                                          required
                                    />
                              </div>
                              <div class="transfer-amount">
                                    <label for="transfer-amount">Amount</label>
                                    <input
                                          type="text"
                                          id="transfer-amount"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter amount to transfer"
                                    />
                              </div>
                              <div class="transfer-money-pin">
                                    <label for="transfer-money-pin"
                                          >Pin Number</label
                                    >
                                    <input
                                          type="text"
                                          id="transfer-money-pin"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 4 digit pin number"
                                    />
                              </div>
                              <button id="add-money">Send Now</button>
                        </div>
                  </section>
                  <section class="get-bonus" id="get-bonus-section">
                        <h1>Get Bonus</h1>
                        <div class="bonus-form">
                              <label for="coupon">Enter Bonus Coupon</label>
                              <input type="text" id="coupon" />
                        </div>
                        <button>Get Bonus</button>
                  </section>
                  <section class="pay-bill" id="pay-bill-section">
                        <h1>Pay Bill</h1>
                        <div class="pay-bill-form">
                              <div class="select-pay-option">
                                    <label for="select-pay"
                                          >Select To Pay</label
                                    >
                                    <select
                                          name="select-pay-bill"
                                          id="select-pay"
                                    >
                                          <option value="bills">
                                                Select A Bill
                                          </option>
                                          <option value="internet">
                                                Internet Bill
                                          </option>
                                          <option value="electricity">
                                                Electricity Bill
                                          </option>
                                          <option value="water">
                                                Water Bill
                                          </option>
                                          <option value="gas">Gas Bill</option>
                                          <option value="education">
                                                Education Bill
                                          </option>
                                          <option value="tv&telephone">
                                                TV & Telephone Bill
                                          </option>
                                          <option value="insurance">
                                                Insurance
                                          </option>
                                    </select>
                              </div>
                              <div class="account-number">
                                    <label for="bank-account-number"
                                          >Biller Account Number</label
                                    >
                                    <input
                                          type="text"
                                          id="bank-account-number"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter account number"
                                          required
                                    />
                              </div>
                              <div class="amount">
                                    <label for="add-amount"
                                          >Amount to Pay</label
                                    >
                                    <input
                                          type="text"
                                          id="add-amount"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Add Amount to pay"
                                    />
                              </div>
                              <div class="add-money-pin">
                                    <label for="add-money-pin"
                                          >Pin Number</label
                                    >
                                    <input
                                          type="text"
                                          id="pay-bill-pin"
                                          inputmode="numeric"
                                          pattern="[0-9]*"
                                          placeholder="Enter 4 Digit Pin"
                                    />
                              </div>
                              <button id="pay-bill">Pay Now</button>
                        </div>
                  </section>
                  <section
                        class="transaction-history"
                        id="transaction-history-section"
                  >
                        <h1>Transaction History</h1>
                        <div class="transaction">
                              <figure>
                                    <img src="assets/icons/pay-bill.png" alt="">
                              </figure>
                              <div class="transaction-text">
                                    <h3>Internet Bill</h3>
                                    <span>Time</span>
                              </div>
                        </div>
                  </section>
            </main>
            <script src="scripts/script.js"></script>
      </body>
</html>
